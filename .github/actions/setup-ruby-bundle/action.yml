name: Setup Ruby Bundle
description: Configure bundler path, restore cache, and install gems when needed

inputs:
  cache-key-prefix:
    description: Cache key prefix
    required: false
    default: gems
  bundle-without:
    description: Bundler groups to exclude
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: bundler config path
      shell: bash
      run: bundle config set path 'vendor/bundle'

    - name: bundler config without
      if: ${{ inputs.bundle-without != '' }}
      shell: bash
      run: bundle config set without '${{ inputs.bundle-without }}'

    - name: cache gems
      id: cache-gems
      uses: actions/cache@v4
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-${{ inputs.cache-key-prefix }}-${{ hashFiles('**/Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-key-prefix }}-

    - name: setup bundle
      if: steps.cache-gems.outputs.cache-hit != 'true'
      shell: bash
      run: bundle install --jobs 4 --retry 3
