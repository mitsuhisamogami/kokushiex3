name: Reusable ECS Deploy

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: Dockerfile.prod
      deploy_ref:
        required: false
        type: string
        default: main
      run_seed:
        required: false
        type: boolean
        default: false

jobs:
  pre-scale-asg:
    name: Pre-scale ASG (${{ inputs.environment_name }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      id-token: write
      contents: read
    outputs:
      original_desired: ${{ steps.scale.outputs.original_desired }}
      original_max: ${{ steps.scale.outputs.original_max }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_ASG_NAME: ${{ vars.ECS_ASG_NAME }}
    steps:
      - name: Validate ASG variables
        run: |
          set -euo pipefail
          if [ -z "${AWS_REGION:-}" ] || [ -z "${ECS_ASG_NAME:-}" ]; then
            echo "::error::Missing required environment variable: AWS_REGION or ECS_ASG_NAME"
            exit 1
          fi

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Scale out ECS ASG for deployment
        id: scale
        run: |
          set -euo pipefail

          # 1台構成では migration 用 one-shot task と rolling update が同時に動けず、
          # ENI/キャパシティ不足でデプロイ失敗しやすいため、デプロイ時のみ一時的に2台化する。
          original_desired="$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ECS_ASG_NAME" \
            --query 'AutoScalingGroups[0].DesiredCapacity' \
            --output text)"
          original_max="$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ECS_ASG_NAME" \
            --query 'AutoScalingGroups[0].MaxSize' \
            --output text)"

          if [ -z "$original_desired" ] || [ "$original_desired" = "None" ] || [ -z "$original_max" ] || [ "$original_max" = "None" ]; then
            echo "::error::Failed to read ASG settings for $ECS_ASG_NAME"
            exit 1
          fi

          target_max="$original_max"
          if [ "$original_max" -lt 2 ]; then
            target_max=2
          fi

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ECS_ASG_NAME" \
            --desired-capacity 2 \
            --max-size "$target_max"

          # aws autoscaling wait が使えない環境でも動くように手動ポーリングで待機する
          for i in $(seq 1 40); do
            in_service_count="$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "$ECS_ASG_NAME" \
              --query "length(AutoScalingGroups[0].Instances[?LifecycleState=='InService'])" \
              --output text)"
            if [ "$in_service_count" -ge 2 ]; then
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "::error::Timed out waiting for ASG instances to become InService (count=$in_service_count)"
              exit 1
            fi
            sleep 15
          done

          echo "original_desired=$original_desired" >> "$GITHUB_OUTPUT"
          echo "original_max=$original_max" >> "$GITHUB_OUTPUT"

  prepare-artifacts:
    name: Prepare Artifacts (${{ inputs.environment_name }})
    needs: pre-scale-asg
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-${{ inputs.environment_name }}
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_ASG_NAME: ${{ vars.ECS_ASG_NAME }}
      WEB_SERVICE: ${{ vars.ECS_WEB_SERVICE }}
      WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
      WEB_TASK_FAMILY: ${{ vars.ECS_WEB_TASK_FAMILY }}
      WORKER_TASK_FAMILY: ${{ vars.ECS_WORKER_TASK_FAMILY }}
      WEB_CONTAINER_NAME: ${{ vars.ECS_WEB_CONTAINER_NAME || 'web' }}
      WORKER_CONTAINER_NAME: ${{ vars.ECS_WORKER_CONTAINER_NAME || 'worker' }}
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
      web_taskdef_arn: ${{ steps.web-taskdef.outputs.task-definition-arn }}
      worker_taskdef_arn: ${{ steps.worker-taskdef.outputs.task-definition-arn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Validate required environment variables
        uses: ./.github/actions/validate-deploy-env
        with:
          aws-region: ${{ env.AWS_REGION }}
          ecr-repository: ${{ env.ECR_REPOSITORY }}
          ecs-cluster: ${{ env.ECS_CLUSTER }}
          ecs-asg-name: ${{ env.ECS_ASG_NAME }}
          web-service: ${{ env.WEB_SERVICE }}
          worker-service: ${{ env.WORKER_SERVICE }}
          web-task-family: ${{ env.WEB_TASK_FAMILY }}
          worker-task-family: ${{ env.WORKER_TASK_FAMILY }}

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          image_tag="$(git rev-parse HEAD)"
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.uri }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Register web task definition revision
        id: web-taskdef
        uses: ./.github/actions/register-ecs-taskdef
        with:
          task-family: ${{ env.WEB_TASK_FAMILY }}
          container-name: ${{ env.WEB_CONTAINER_NAME }}
          image-uri: ${{ steps.image.outputs.uri }}

      - name: Register worker task definition revision
        id: worker-taskdef
        uses: ./.github/actions/register-ecs-taskdef
        with:
          task-family: ${{ env.WORKER_TASK_FAMILY }}
          container-name: ${{ env.WORKER_CONTAINER_NAME }}
          image-uri: ${{ steps.image.outputs.uri }}

  # Schema 互換性リスクを避けるため、migrate は deploy より先に必ず直列実行する。
  migrate-db:
    name: Run Migrate (${{ inputs.environment_name }})
    needs: prepare-artifacts
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      WEB_SERVICE: ${{ vars.ECS_WEB_SERVICE }}
      WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
      WEB_CONTAINER_NAME: ${{ vars.ECS_WEB_CONTAINER_NAME || 'web' }}
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrate (and optional seed)
        uses: ./.github/actions/run-ecs-migrate
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          web-service: ${{ env.WEB_SERVICE }}
          worker-service: ${{ env.WORKER_SERVICE }}
          web-taskdef-arn: ${{ needs.prepare-artifacts.outputs.web_taskdef_arn }}
          web-container-name: ${{ env.WEB_CONTAINER_NAME }}
          run-seed: ${{ inputs.run_seed }}

  # migrate 完了後は web/worker を並列更新し、services-stable の待機開始を前倒しする。
  deploy-web:
    name: Deploy Web (${{ inputs.environment_name }})
    needs: [prepare-artifacts, migrate-db]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      WEB_SERVICE: ${{ vars.ECS_WEB_SERVICE }}
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update web service
        uses: ./.github/actions/update-ecs-service
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.WEB_SERVICE }}
          task-definition-arn: ${{ needs.prepare-artifacts.outputs.web_taskdef_arn }}

      - name: Wait for web service to stabilize
        run: |
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$WEB_SERVICE"

  # worker も web と並列で更新・待機させて全体デプロイ時間を短縮する。
  deploy-worker:
    name: Deploy Worker (${{ inputs.environment_name }})
    needs: [prepare-artifacts, migrate-db]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      WORKER_SERVICE: ${{ vars.ECS_WORKER_SERVICE }}
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update worker service
        uses: ./.github/actions/update-ecs-service
        with:
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.WORKER_SERVICE }}
          task-definition-arn: ${{ needs.prepare-artifacts.outputs.worker_taskdef_arn }}

      - name: Wait for worker service to stabilize
        run: |
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$WORKER_SERVICE"

  deployment-summary:
    name: Deployment Summary (${{ inputs.environment_name }})
    needs: [prepare-artifacts, deploy-web, deploy-worker]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    if: needs.deploy-web.result == 'success' && needs.deploy-worker.result == 'success'
    steps:
      - name: Deployment summary
        run: |
          {
            echo "### ECS Deploy Succeeded"
            echo ""
            echo "- Environment: \`${{ inputs.environment_name }}\`"
            echo "- Deploy ref: \`${{ inputs.deploy_ref }}\`"
            echo "- Run seed: \`${{ inputs.run_seed }}\`"
            echo "- Image: \`${{ needs.prepare-artifacts.outputs.image_uri }}\`"
            echo "- ASG: \`${{ vars.ECS_ASG_NAME }}\` (scaled out to 2 during deploy)"
            echo "- Web task def: \`${{ needs.prepare-artifacts.outputs.web_taskdef_arn }}\`"
            echo "- Worker task def: \`${{ needs.prepare-artifacts.outputs.worker_taskdef_arn }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  restore-scale-asg:
    name: Restore ASG (${{ inputs.environment_name }})
    needs: [pre-scale-asg, prepare-artifacts, migrate-db, deploy-web, deploy-worker]
    if: always() && needs.pre-scale-asg.result == 'success'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_ASG_NAME: ${{ vars.ECS_ASG_NAME }}
      ORIGINAL_DESIRED: ${{ needs.pre-scale-asg.outputs.original_desired }}
      ORIGINAL_MAX: ${{ needs.pre-scale-asg.outputs.original_max }}
    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore ECS ASG capacity
        run: |
          set -euo pipefail

          # デプロイ成否にかかわらず、通常運用コストを維持するため元の台数へ戻す。
          if [ -z "${ORIGINAL_DESIRED:-}" ] || [ -z "${ORIGINAL_MAX:-}" ]; then
            echo "::warning::Skip restore because original ASG values are empty"
            exit 0
          fi

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "$ECS_ASG_NAME" \
            --desired-capacity "$ORIGINAL_DESIRED" \
            --max-size "$ORIGINAL_MAX"

          if [ "$ORIGINAL_DESIRED" -gt 0 ]; then
            for i in $(seq 1 40); do
              in_service_count="$(aws autoscaling describe-auto-scaling-groups \
                --auto-scaling-group-names "$ECS_ASG_NAME" \
                --query "length(AutoScalingGroups[0].Instances[?LifecycleState=='InService'])" \
                --output text)"
              if [ "$in_service_count" -ge "$ORIGINAL_DESIRED" ]; then
                break
              fi
              if [ "$i" -eq 40 ]; then
                echo "::warning::Timed out waiting for ASG restore (target=$ORIGINAL_DESIRED current=$in_service_count)"
                break
              fi
              sleep 15
            done
          fi
