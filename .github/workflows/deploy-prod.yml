name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref to deploy (branch or tag)"
        required: false
        default: "main"
        type: string
      run_seed:
        description: "Run seed_fu after db:migrate"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      environment_name: production
      dockerfile: Dockerfile.prod
      deploy_ref: ${{ inputs.deploy_ref || 'main' }}
      run_seed: ${{ inputs.run_seed || false }}
    secrets: inherit
